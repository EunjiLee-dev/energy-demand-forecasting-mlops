name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build & Tag image
        run: |
          docker build -t europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/energy-repo/energy-api .

      - name: Push image
        run: |
          docker push europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/energy-repo/energy-api

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy energy-api \
            --image europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/energy-repo/energy-api \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated